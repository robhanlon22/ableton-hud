name: E2E
permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            report_tag: windows
          - os: macos-latest
            report_tag: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Cache Electron and Playwright binaries on Windows
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/ms-playwright
          key: >-
            e2e-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            e2e-binaries-${{ runner.os }}-

      - name: Cache Electron and Playwright binaries on macOS
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/ms-playwright
          key: >-
            e2e-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            e2e-binaries-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run Playwright Electron E2E
        env:
          CI_ENVIRONMENT_NAME: ${{ matrix.report_tag }}
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.report_tag }}
          path: |
            test-results/playwright
            playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright blob report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report-${{ matrix.report_tag }}
          path: blob-report
          if-no-files-found: ignore

  build-pages-report:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: e2e
    permissions:
      actions: read
      contents: read
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Playwright blob reports
        uses: actions/download-artifact@v4
        with:
          path: downloaded-blob-report
          pattern: playwright-blob-report-*

      - name: Stage Playwright blob reports
        run: |
          shopt -s nullglob
          report_paths=(downloaded-blob-report/playwright-blob-report-*/report-*.zip)
          test "${#report_paths[@]}" -gt 0
          mkdir -p merged-blob-report
          for report_path in "${report_paths[@]}"; do
            report_name="$(basename "$(dirname "$report_path")")"
            cp "$report_path" "merged-blob-report/${report_name}.zip"
          done

      - name: Merge Playwright reports
        run: pnpm exec playwright merge-reports --config=playwright.merge.config.ts merged-blob-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-pages-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      cancel-in-progress: true
      group: github-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
