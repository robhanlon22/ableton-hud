name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-macos-universal:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Cache Electron and Playwright build tooling
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/Library/Caches/ms-playwright
          key: >-
            electron-builder-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            electron-builder-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run Playwright Electron E2E
        run: pnpm run test:e2e

      - name: Build macOS universal app
        run: pnpm dist:mac

      - name: Package release artifacts
        id: package
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          app_path="dist/mac-universal/Ableton HUD.app"
          zip_path="dist/Ableton-HUD-${tag}-mac-universal.zip"
          sha_path="${zip_path}.sha256"

          if [ ! -d "${app_path}" ]; then
            echo "Missing app bundle at ${app_path}" >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "${zip_path}"
          shasum -a 256 "${zip_path}" > "${sha_path}"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"
          echo "sha_path=${sha_path}" >> "${GITHUB_OUTPUT}"

      - name: Create immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.package.outputs.tag }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
          SHA_PATH: ${{ steps.package.outputs.sha_path }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; immutability enabled, refusing to modify." >&2
            exit 1
          fi

          gh release create "${TAG}" "${ZIP_PATH}" "${SHA_PATH}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
