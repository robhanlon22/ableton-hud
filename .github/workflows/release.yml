name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-validate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Cache Electron and Playwright binaries on Windows
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
            ~/AppData/Local/ms-playwright
          key: >-
            release-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            release-binaries-${{ runner.os }}-

      - name: Cache Electron and Playwright binaries on macOS
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/Library/Caches/ms-playwright
          key: >-
            release-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            release-binaries-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium on Windows
        if: runner.os == 'Windows'
        run: pnpm exec playwright install chromium

      - name: Install Playwright Chromium on macOS
        if: runner.os == 'macOS'
        run: pnpm exec playwright install chromium

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run Playwright Electron E2E on Windows
        if: runner.os == 'Windows'
        run: pnpm run test:e2e

      - name: Run Playwright Electron E2E on macOS
        if: runner.os == 'macOS'
        run: pnpm run test:e2e

      - name: Build release validation target on Windows
        if: runner.os == 'Windows'
        run: pnpm run build && pnpm exec electron-builder --win dir --publish never

      - name: Build release validation target on macOS
        if: runner.os == 'macOS'
        run: pnpm run dist:mac

      - name: Package staged release assets on macOS
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          app_path="dist/mac-universal/Ableton HUD.app"
          zip_path="dist/Ableton-HUD-${tag}-mac-universal.zip"
          sha_path="${zip_path}.sha256"

          if [ ! -d "${app_path}" ]; then
            echo "Missing app bundle at ${app_path}" >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "${zip_path}"
          hash="$(shasum -a 256 "${zip_path}" | awk '{print $1}')"
          printf '%s  %s\n' "${hash}" "$(basename "${zip_path}")" > "${sha_path}"

      - name: Upload staged release assets
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}
          path: |
            dist/Ableton-HUD-${{ github.ref_name }}-mac-universal.zip
            dist/Ableton-HUD-${{ github.ref_name }}-mac-universal.zip.sha256
          if-no-files-found: error

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-release-${{ runner.os }}
          path: |
            test-results/playwright
            playwright-report
          if-no-files-found: ignore

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-validate
    runs-on: ubuntu-latest
    steps:
      - name: Download staged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Create immutable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t release_files < <(find release-assets -maxdepth 1 -type f -print | sort)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; immutability enabled, refusing to modify." >&2
            exit 1
          fi

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No staged release assets found for ${TAG}" >&2
            exit 1
          fi

          gh release create "${TAG}" "${release_files[@]}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
