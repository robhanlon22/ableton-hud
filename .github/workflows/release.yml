name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  await-upstream-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for lint, test, and E2E workflows
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          TRIGGER_EVENT: ${{ github.event_name }}
        with:
          script: |
            const POLL_INTERVAL_MS = 15_000;
            const TIMEOUT_MS = 45 * 60 * 1000;
            const REQUIRED_WORKFLOWS = ["Lint", "Test", "E2E"];
            const headSha = process.env.HEAD_SHA;
            const refName = process.env.REF_NAME;
            const refType = process.env.REF_TYPE;
            const triggerEvent = process.env.TRIGGER_EVENT;
            const startedAt = Date.now();
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const matchesExpectedTrigger = (run) => {
              if (!REQUIRED_WORKFLOWS.includes(run.name) || run.head_sha !== headSha) {
                return false;
              }

              if (triggerEvent === "pull_request") {
                return run.event === "pull_request";
              }

              if (refType === "tag") {
                return (
                  run.event === "push" &&
                  (run.head_branch === refName ||
                    run.head_branch === null ||
                    run.head_branch === "")
                );
              }

              return run.event === "push" && run.head_branch === refName;
            };

            while (Date.now() - startedAt < TIMEOUT_MS) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: headSha,
                per_page: 100,
              });

              const matchingRuns = data.workflow_runs
                .filter(matchesExpectedTrigger)
                .sort((left, right) => {
                  return Date.parse(right.created_at) - Date.parse(left.created_at);
                });

              const latestRunByName = new Map();
              for (const workflowName of REQUIRED_WORKFLOWS) {
                latestRunByName.set(
                  workflowName,
                  matchingRuns.find((run) => run.name === workflowName),
                );
              }

              const pendingWorkflowNames = REQUIRED_WORKFLOWS.filter((workflowName) => {
                const run = latestRunByName.get(workflowName);
                return run === undefined || run.status !== "completed";
              });

              if (pendingWorkflowNames.length > 0) {
                core.info(`Waiting on workflows for ${headSha}: ${pendingWorkflowNames.join(", ")}`);
                await new Promise((resolve) => setTimeout(resolve, POLL_INTERVAL_MS));
                continue;
              }

              const failedRuns = REQUIRED_WORKFLOWS
                .map((workflowName) => latestRunByName.get(workflowName))
                .filter((run) => run.conclusion !== "success");

              if (failedRuns.length > 0) {
                const details = failedRuns
                  .map((run) => `${run.name}: ${run.conclusion} (${run.html_url})`)
                  .join("\n");
                core.setFailed(`Required workflows did not succeed for ${headSha}:\n${details}`);
                return;
              }

              core.notice(
                REQUIRED_WORKFLOWS.map((workflowName) => {
                  const run = latestRunByName.get(workflowName);
                  return `${workflowName}: ${run.html_url}`;
                }).join("\n"),
              );
              return;
            }

            core.setFailed(
              `Timed out waiting for Lint, Test, and E2E workflows for ${headSha}.`,
            );

  typecheck:
    needs: await-upstream-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  release-build:
    needs:
      - await-upstream-checks
      - typecheck
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Cache Electron and Playwright binaries on Windows
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: >-
            release-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            release-binaries-${{ runner.os }}-

      - name: Cache Electron and Playwright binaries on macOS
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: >-
            release-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            release-binaries-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release validation target on Windows
        if: runner.os == 'Windows'
        run: pnpm run build && pnpm exec electron-builder --win dir --publish never

      - name: Build release validation target on macOS
        if: runner.os == 'macOS'
        run: pnpm run dist:mac

      - name: Package staged release assets on macOS
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          app_path="dist/mac-universal/Ableton HUD.app"
          zip_path="dist/Ableton-HUD-${tag}-mac-universal.zip"
          sha_path="${zip_path}.sha256"

          if [ ! -d "${app_path}" ]; then
            echo "Missing app bundle at ${app_path}" >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "${zip_path}"
          hash="$(shasum -a 256 "${zip_path}" | awk '{print $1}')"
          printf '%s  %s\n' "${hash}" "$(basename "${zip_path}")" > "${sha_path}"

      - name: Upload staged release assets
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}
          path: |
            dist/Ableton-HUD-${{ github.ref_name }}-mac-universal.zip
            dist/Ableton-HUD-${{ github.ref_name }}-mac-universal.zip.sha256
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: ubuntu-latest
    steps:
      - name: Download staged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Create immutable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t release_files < <(find release-assets -maxdepth 1 -type f -print | sort)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; immutability enabled, refusing to modify." >&2
            exit 1
          fi

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No staged release assets found for ${TAG}" >&2
            exit 1
          fi

          gh release create "${TAG}" "${release_files[@]}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
