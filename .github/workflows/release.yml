name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

jobs:
  await-upstream-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for lint, test, and E2E workflows
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const POLL_INTERVAL_MS = 15_000;
            const TIMEOUT_MS = 45 * 60 * 1000;
            const REQUIRED_WORKFLOWS = ["Lint", "Test", "E2E"];
            const headSha = process.env.HEAD_SHA;
            const refName = process.env.REF_NAME;
            const startedAt = Date.now();
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const matchesExpectedTrigger = (run) => {
              if (!REQUIRED_WORKFLOWS.includes(run.name) || run.head_sha !== headSha) {
                return false;
              }

              return (
                run.event === "push" &&
                (run.head_branch === refName ||
                  run.head_branch === null ||
                  run.head_branch === "")
              );
            };

            while (Date.now() - startedAt < TIMEOUT_MS) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: headSha,
                per_page: 100,
              });

              const matchingRuns = data.workflow_runs
                .filter(matchesExpectedTrigger)
                .sort((left, right) => {
                  return Date.parse(right.created_at) - Date.parse(left.created_at);
                });

              const latestRunByName = new Map();
              for (const workflowName of REQUIRED_WORKFLOWS) {
                latestRunByName.set(
                  workflowName,
                  matchingRuns.find((run) => run.name === workflowName),
                );
              }

              const pendingWorkflowNames = REQUIRED_WORKFLOWS.filter((workflowName) => {
                const run = latestRunByName.get(workflowName);
                return run === undefined || run.status !== "completed";
              });

              if (pendingWorkflowNames.length > 0) {
                core.info(
                  `Waiting on workflows for ${headSha}: ${pendingWorkflowNames.join(", ")}`,
                );
                await new Promise((resolve) => setTimeout(resolve, POLL_INTERVAL_MS));
                continue;
              }

              const failedRuns = REQUIRED_WORKFLOWS
                .map((workflowName) => latestRunByName.get(workflowName))
                .filter((run) => run.conclusion !== "success");

              if (failedRuns.length > 0) {
                const details = failedRuns
                  .map((run) => `${run.name}: ${run.conclusion} (${run.html_url})`)
                  .join("\n");
                core.setFailed(`Required workflows did not succeed for ${headSha}:\n${details}`);
                return;
              }

              core.notice(
                REQUIRED_WORKFLOWS.map((workflowName) => {
                  const run = latestRunByName.get(workflowName);
                  return `${workflowName}: ${run.html_url}`;
                }).join("\n"),
              );
              return;
            }

            core.setFailed(
              `Timed out waiting for Lint, Test, and E2E workflows for ${headSha}.`,
            );

  release:
    needs: await-upstream-checks
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Cache Electron and Playwright binaries on macOS
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: >-
            release-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            release-binaries-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build final release assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          app_path="dist/mac-universal/Ableton HUD.app"
          zip_path="dist/Ableton-HUD-${tag}-mac-universal.zip"
          sha_path="${zip_path}.sha256"

          pnpm run dist:mac

          if [ ! -d "${app_path}" ]; then
            echo "Missing app bundle at ${app_path}" >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "${zip_path}"
          hash="$(shasum -a 256 "${zip_path}" | awk '{print $1}')"
          printf '%s  %s\n' "${hash}" "$(basename "${zip_path}")" > "${sha_path}"

      - name: Create immutable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          release_files=(
            "dist/Ableton-HUD-${TAG}-mac-universal.zip"
            "dist/Ableton-HUD-${TAG}-mac-universal.zip.sha256"
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; immutability enabled, refusing to modify." >&2
            exit 1
          fi

          for release_file in "${release_files[@]}"; do
            if [ ! -f "${release_file}" ]; then
              echo "Missing release asset ${release_file}" >&2
              exit 1
            fi
          done

          gh release create "${TAG}" "${release_files[@]}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag
