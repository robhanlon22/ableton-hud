name: Playwright Report

on:
  workflow_run:
    workflows:
      - E2E
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  build-pages-report:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Playwright blob reports
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          path: downloaded-blob-report
          pattern: playwright-blob-report-*
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Stage Playwright blob reports
        run: |
          shopt -s nullglob
          report_paths=(downloaded-blob-report/playwright-blob-report-*/report-*.zip)
          test "${#report_paths[@]}" -gt 0
          mkdir -p merged-blob-report
          for report_path in "${report_paths[@]}"; do
            report_name="$(basename "$(dirname "$report_path")")"
            cp "$report_path" "merged-blob-report/${report_name}.zip"
          done

      - name: Merge Playwright reports
        run: pnpm exec playwright merge-reports --config=playwright.merge.config.ts merged-blob-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

  deploy-pages:
    needs: build-pages-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      cancel-in-progress: true
      group: github-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
